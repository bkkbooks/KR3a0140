body:
  text: 劉氏政論論治道昔者周有亂臣十人有婦人焉九人而已孔子稱其才難不其然乎明賢者難得也況亂獘之後百姓凋盡士之存者蓋亦無幾股肱大職及州郡督司邊方重任雖備其官亦未得其人也此非選者之不用意蓋才匱使之然耳況於長吏以下群職小任能皆簡練備得其人也其計莫如督之以法不爾而數轉易往來不已送迎之煩不可勝計轉易之間輒有姦巧既於其事不省而為政者亦以其不得久安之故知惠益不得成於己而苟且之可免於患皆將不念盡心於卹民而夢想於聲譽此非所以為政之本意也今之所以用黜陟者近頗以州郡之毀譽聽往來之浮言耳亦皆得其事實而課其能否也長吏之所以為佳者奉法也憂公也卹民也此三事者或州郡有所不便往來者有所不安而長吏執之不已於治雖得計其聲譽未為美闕而從人於治雖失計其聲譽必集也長吏皆知黜陟之在於此也亦何能不去本而就末哉以為長吏皆宜使小久足使自展歲課之能三年總計乃加黜陟課之皆當以事不得依名事者皆以戶口率其墾田之多少及盜賊發興民之亡叛者為得負之計如此行之則無能之吏修名無益有能之人無名無損法之一行雖無部司之監姦譽妄毀可得而盡魏志傳裴松之注引廙別傳
